<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ============================== CONSTANTS ============================== */
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const RENT_UNITS = ["Aqeel - Shop Rent","Aslam - Shop Rent","Sheba - 1st Floor Portion","Asif - 2nd Floor Portion","Rema - 3rd Floor Portion"];
const SHOP_UNITS = ["Aqeel - Shop Rent","Aslam - Shop Rent"];
const PORTION_UNITS = ["Sheba - 1st Floor Portion","Asif - 2nd Floor Portion","Rema - 3rd Floor Portion"];
const RECURRING_CATEGORIES = [
  { name: "Electricity Bill", method: "Bank" }, { name: "Gas Bill", method: "Bank" },
  { name: "Monthly Groceries", method: "Cash" }, { name: "Milk Bill", method: "Cash" },
  { name: "Maid Salary", method: "Cash" }, { name: "Sisters Pocket Money", method: "Cash" },
  { name: "Brothers Pocket Money", method: "Cash" }, { name: "Sister Tuition", method: "Bank" },
  { name: "Sister School Fees", method: "Bank" }, { name: "Brother College Fees", method: "Bank" },
  { name: "Brother Institute Fees", method: "Bank" }, { name: "Internet Bill", method: "Bank" },
  { name: "Mobile Bill", method: "Bank" },
];
const ONEOFF_CATEGORIES = ["Water Tanker","Cylinder Bill","Mineral Water Bottles","Wheat (Atta)","Home Maintenance","Medical","Fuel / Transport","Loan / Installment Payment","Savings","Investment","Zakat / Sadqa","Other Small Expenses"];
const FAMILY_MEMBERS = ["Ammi","Ahsan (Self)","Sister","Brother","Whole Family / Shared","Maid","Other"];
const CASH_BANK = ["Cash","Bank"];
const CURRENT_YEAR = new Date().getFullYear();
const STORAGE_KEY = "ghar-finance-data-v1";
const PALETTE = ["#2563EB","#D4AF37","#22C55E","#F87171","#A78BFA","#F59E0B","#34D399","#F472B6","#60A5FA","#FBBF24","#4ADE80","#FB923C","#38BDF8"];

const fmt = (n) => {
  const v = Math.round(Number(n) || 0);
  const s = "Rs " + Math.abs(v).toLocaleString("en-PK");
  return v < 0 ? `(${s})` : s;
};
const pct = (n) => `${((Number(n)||0)*100).toFixed(1)}%`;
const uid = () => Math.random().toString(36).slice(2, 10);

function defaultRentRecords() {
  const out = {};
  MONTHS.forEach((m) => RENT_UNITS.forEach((u) => { out[`${u}|${m}`] = { unit:u, month:m, dueDate:"", due:0, received:0, cashBank:"", notes:"" }; }));
  return out;
}
function defaultRecurring() {
  const out = {};
  RECURRING_CATEGORIES.forEach(({ name, method }) => { out[name] = { method, months: Array(12).fill(0) }; });
  return out;
}
function defaultState() {
  return {
    rent: defaultRentRecords(),
    income: [{ id: uid(), date: `${CURRENT_YEAR}-01-01`, source: "Ammi Pension", dueDate: `${CURRENT_YEAR}-01-01`, expected: 60000, received: 60000, cashBank: "Cash", notes: "Mahana ghar ki pension" }],
    recurring: defaultRecurring(),
    expenses: [{ id: uid(), date: `${CURRENT_YEAR}-01-08`, category: "Medical", familyMember: "Ammi", description: "Dr. checkup + dawai", amount: 6500, cashBank: "Cash", notes: "" }],
    goals: [
      { id: uid(), goal: "Emergency Fund", target: 300000, saved: 0 },
      { id: uid(), goal: "House Renovation", target: 500000, saved: 0 },
      { id: uid(), goal: "Investment", target: 200000, saved: 0 },
      { id: uid(), goal: "Hajj / Umrah", target: 800000, saved: 0 },
    ],
    openingCash: 0, openingBank: 0,
  };
}
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return { ...defaultState(), ...JSON.parse(raw) };
  } catch (e) {}
  return defaultState();
}

/* ============================== SMALL UI PRIMITIVES ============================== */
function Card({ children, style }) { return <div style={{ background:"#0f172a", border:"1px solid #1e293b", borderRadius:16, ...style }}>{children}</div>; }
function SectionTitle({ title, subtitle }) {
  return <div style={{ marginBottom:20 }}>
    <h1 style={{ fontSize:22, fontWeight:800, margin:0, color:"#fff" }}>{title}</h1>
    {subtitle && <p style={{ color:"#94a3b8", fontSize:13, marginTop:4 }}>{subtitle}</p>}
  </div>;
}
function KPI({ label, value, positive, sub }) {
  const color = positive === undefined ? "#D4AF37" : positive ? "#34d399" : "#f87171";
  return <Card style={{ padding:14 }}>
    <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:.5, color:"#94a3b8", fontWeight:700 }}>{label}</div>
    <div style={{ fontSize:20, fontWeight:800, marginTop:6, color }}>{value}</div>
    {sub && <div style={{ fontSize:11, color:"#64748b", marginTop:4 }}>{sub}</div>}
  </Card>;
}
function Th({ children }) { return <th style={{ textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:.4, color:"#94a3b8", fontWeight:700, padding:"10px 10px" }}>{children}</th>; }
function Td({ children, style }) { return <td style={{ padding:"7px 10px", fontSize:13, borderTop:"1px solid #1e293b", ...style }}>{children}</td>; }
const inputStyle = { background:"#1e293b", border:"1px solid #334155", borderRadius:8, padding:"6px 9px", fontSize:13, color:"#f1f5f9", width:"100%", outline:"none" };
function Input(props) { return <input {...props} style={{ ...inputStyle, ...(props.style||{}) }} />; }
function Select({ options, value, onChange, style }) {
  return <select value={value||""} onChange={onChange} style={{ ...inputStyle, ...style }}>
    <option value="">-</option>
    {options.map(o => <option key={o} value={o}>{o}</option>)}
  </select>;
}
function Btn({ children, onClick, kind="ghost", style }) {
  const kinds = {
    primary: { background:"#2563eb", color:"#fff", border:"none" },
    ghost: { background:"#1e293b", color:"#e2e8f0", border:"1px solid #334155" },
    link: { background:"transparent", color:"#60a5fa", border:"none", padding:0 },
  };
  return <button onClick={onClick} style={{ cursor:"pointer", borderRadius:10, padding:"9px 14px", fontSize:13, fontWeight:600, display:"inline-flex", alignItems:"center", gap:6, ...kinds[kind], ...style }}>{children}</button>;
}

/* ============================== SIMPLE CHARTS (no external chart lib) ============================== */
function BarChartSimple({ data, aKey, bKey, aColor="#2563EB", bColor="#F87171", height=220 }) {
  const max = Math.max(1, ...data.map(d => Math.max(d[aKey], d[bKey])));
  return <div style={{ display:"flex", alignItems:"flex-end", gap:6, height, overflowX:"auto", paddingBottom:22, position:"relative" }}>
    {data.map((d,i) => (
      <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:"center", minWidth:34, flex:1 }}>
        <div style={{ display:"flex", alignItems:"flex-end", gap:2, height:height-26, width:"100%", justifyContent:"center" }}>
          <div title={fmt(d[aKey])} style={{ width:10, background:aColor, borderRadius:"3px 3px 0 0", height:`${(d[aKey]/max)*100}%` }} />
          <div title={fmt(d[bKey])} style={{ width:10, background:bColor, borderRadius:"3px 3px 0 0", height:`${(d[bKey]/max)*100}%` }} />
        </div>
        <div style={{ fontSize:9, color:"#94a3b8", marginTop:4, position:"absolute", bottom:0, transform:`translateX(${i===0?0:0}px)`, width:34, textAlign:"center", left:i*40+6 }}>{d.label}</div>
      </div>
    ))}
  </div>;
}
function LineChartSimple({ data, height=180, color="#D4AF37" }) {
  const w = Math.max(320, data.length*46);
  const vals = data.map(d=>d.value);
  const min = Math.min(0, ...vals), max = Math.max(1, ...vals);
  const range = (max-min) || 1;
  const pts = data.map((d,i) => {
    const x = (i/(data.length-1||1)) * (w-30) + 15;
    const y = height-30 - ((d.value-min)/range) * (height-50);
    return `${x},${y}`;
  }).join(" ");
  return <div style={{ overflowX:"auto" }}>
    <svg width={w} height={height}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" />
      {data.map((d,i) => {
        const x = (i/(data.length-1||1)) * (w-30) + 15;
        const y = height-30 - ((d.value-min)/range) * (height-50);
        return <g key={i}>
          <circle cx={x} cy={y} r="3.5" fill={color} />
          <text x={x} y={height-10} fontSize="9" fill="#94a3b8" textAnchor="middle">{d.label}</text>
        </g>;
      })}
    </svg>
  </div>;
}
function PieChartSimple({ data, size=190 }) {
  const total = data.reduce((s,d)=>s+d.total,0) || 1;
  let acc = 0;
  const stops = data.map((d,i) => {
    const start = (acc/total)*360; acc += d.total;
    const end = (acc/total)*360;
    return `${PALETTE[i%PALETTE.length]} ${start}deg ${end}deg`;
  }).join(", ");
  return <div style={{ display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
    <div style={{ width:size, height:size, borderRadius:"50%", background:`conic-gradient(${stops})`, flexShrink:0 }} />
    <div style={{ display:"flex", flexDirection:"column", gap:5, fontSize:11.5, maxHeight:size, overflowY:"auto" }}>
      {data.map((d,i) => (
        <div key={d.name} style={{ display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ width:9, height:9, borderRadius:3, background:PALETTE[i%PALETTE.length], flexShrink:0 }} />
          <span style={{ color:"#cbd5e1" }}>{d.name}</span>
          <span style={{ color:"#64748b", marginLeft:"auto" }}>{fmt(d.total)}</span>
        </div>
      ))}
    </div>
  </div>;
}

/* ============================== COMPUTATIONS ============================== */
function dMonth(dateStr) { if (!dateStr) return ""; const d = new Date(dateStr); return isNaN(d) ? "" : MONTHS[d.getMonth()]; }
function computeMonthly(data) {
  const rows = MONTHS.map((m, idx) => {
    const pension = data.income.filter(e=>e.source==="Ammi Pension" && dMonth(e.date)===m).reduce((s,e)=>s+Number(e.received||0),0);
    const other = data.income.filter(e=>e.source==="Other Income" && dMonth(e.date)===m).reduce((s,e)=>s+Number(e.received||0),0);
    const rentBySource = {};
    RENT_UNITS.forEach(u => { rentBySource[u] = Number(data.rent[`${u}|${m}`]?.received || 0); });
    const totalIncome = pension + other + Object.values(rentBySource).reduce((a,b)=>a+b,0);
    const recurringTotal = Object.values(data.recurring).reduce((s,c)=>s+Number(c.months[idx]||0),0);
    const oneoffTotal = data.expenses.filter(e=>dMonth(e.date)===m).reduce((s,e)=>s+Number(e.amount||0),0);
    const totalExpense = recurringTotal + oneoffTotal;
    const profit = totalIncome - totalExpense;
    return { month:m, pension, other, rentBySource, totalIncome, totalExpense, profit, savingsPct: totalIncome ? profit/totalIncome : 0 };
  });
  let cum = 0;
  return rows.map(r => { cum += r.profit; return { ...r, cumulative: cum }; });
}
function computeHalfYearly(monthly) {
  const agg = (arr) => { const income = arr.reduce((s,r)=>s+r.totalIncome,0); const expense = arr.reduce((s,r)=>s+r.totalExpense,0); return { income, expense, profit: income-expense }; };
  return { h1: agg(monthly.slice(0,6)), h2: agg(monthly.slice(6,12)) };
}
function computeYearly(monthly) {
  const income = monthly.reduce((s,r)=>s+r.totalIncome,0);
  const expense = monthly.reduce((s,r)=>s+r.totalExpense,0);
  const avgSavings = monthly.reduce((s,r)=>s+r.savingsPct,0)/12;
  return { income, expense, profit: income-expense, avgIncome: income/12, avgExpense: expense/12, avgSavings };
}
function computeCategoryTotals(data) {
  const rec = RECURRING_CATEGORIES.map(({name}) => ({ name, total: (data.recurring[name]?.months||[]).reduce((a,b)=>a+Number(b||0),0) }));
  const off = ONEOFF_CATEGORIES.map((name) => ({ name, total: data.expenses.filter(e=>e.category===name).reduce((s,e)=>s+Number(e.amount||0),0) }));
  return [...rec, ...off].sort((a,b)=>b.total-a.total);
}
function computeIncomeTotals(monthly) {
  const pension = monthly.reduce((s,r)=>s+r.pension,0);
  const other = monthly.reduce((s,r)=>s+r.other,0);
  const rent = {}; RENT_UNITS.forEach(u => { rent[u] = monthly.reduce((s,r)=>s+(r.rentBySource[u]||0),0); });
  return [{ name:"Ammi Pension", total:pension }, ...RENT_UNITS.map(u=>({ name:u, total:rent[u] })), { name:"Other Income", total:other }];
}
function computeCashBank(data) {
  const cashIn = data.income.filter(e=>e.cashBank==="Cash").reduce((s,e)=>s+Number(e.received||0),0) + Object.values(data.rent).filter(r=>r.cashBank==="Cash").reduce((s,r)=>s+Number(r.received||0),0);
  const bankIn = data.income.filter(e=>e.cashBank==="Bank").reduce((s,e)=>s+Number(e.received||0),0) + Object.values(data.rent).filter(r=>r.cashBank==="Bank").reduce((s,r)=>s+Number(r.received||0),0);
  const cashOutRec = Object.values(data.recurring).filter(c=>c.method==="Cash").reduce((s,c)=>s+c.months.reduce((a,b)=>a+Number(b||0),0),0);
  const bankOutRec = Object.values(data.recurring).filter(c=>c.method==="Bank").reduce((s,c)=>s+c.months.reduce((a,b)=>a+Number(b||0),0),0);
  const cashOutOff = data.expenses.filter(e=>e.cashBank==="Cash").reduce((s,e)=>s+Number(e.amount||0),0);
  const bankOutOff = data.expenses.filter(e=>e.cashBank==="Bank").reduce((s,e)=>s+Number(e.amount||0),0);
  const cashOut = cashOutRec+cashOutOff, bankOut = bankOutRec+bankOutOff;
  return { cashIn, bankIn, cashOut, bankOut, cashInHand: Number(data.openingCash||0)+cashIn-cashOut, bankBalance: Number(data.openingBank||0)+bankIn-bankOut };
}
function computeAnalytics(data, categoryTotals) {
  const top = categoryTotals[0] || { name:"-", total:0 };
  const famBase = { "Ammi":0,"Ahsan (Self)":0,"Sister":0,"Brother":0,"Whole Family / Shared":0,"Maid":0,"Other":0 };
  data.expenses.forEach(e => { if (famBase[e.familyMember] !== undefined) famBase[e.familyMember] += Number(e.amount||0); });
  const recBy = (n) => data.recurring[n]?.months.reduce((a,b)=>a+Number(b||0),0) || 0;
  famBase["Sister"] += recBy("Sisters Pocket Money")+recBy("Sister Tuition")+recBy("Sister School Fees");
  famBase["Brother"] += recBy("Brothers Pocket Money")+recBy("Brother College Fees")+recBy("Brother Institute Fees");
  famBase["Maid"] += recBy("Maid Salary");
  famBase["Whole Family / Shared"] += recBy("Electricity Bill")+recBy("Gas Bill")+recBy("Monthly Groceries")+recBy("Milk Bill")+recBy("Internet Bill")+recBy("Mobile Bill");
  const familySpend = Object.entries(famBase).map(([name,total])=>({name,total})).sort((a,b)=>b.total-a.total);
  const tenants = RENT_UNITS.map(u => {
    const recs = MONTHS.map(m => data.rent[`${u}|${m}`]);
    const expected = recs.reduce((s,r)=>s+Number(r?.due||0),0);
    const received = recs.reduce((s,r)=>s+Number(r?.received||0),0);
    return { unit:u, expected, received, pending: expected-received, pct: expected ? received/expected : 0 };
  });
  return { top, familySpend, tenants };
}
function computeHealth(data, yearly) {
  const savingsRate = yearly.income ? Math.max(0, yearly.profit/yearly.income) : 0;
  const expected = Object.values(data.rent).reduce((s,r)=>s+Number(r.due||0),0);
  const received = Object.values(data.rent).reduce((s,r)=>s+Number(r.received||0),0);
  const collectionRate = expected ? received/expected : 1;
  return { score: Math.round(Math.max(0, Math.min(100, savingsRate*60 + collectionRate*40))), collectionRate };
}

/* ============================== FAMILY DATA DOC (shared, realtime) ============================== */
const FAMILY_DOC = db.collection("families").doc("main");

function App({ user }) {
  const [data, setData] = useState(loadData());
  const [cloudReady, setCloudReady] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [navOpen, setNavOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const fileRef = useRef(null);
  const skipNextWrite = useRef(false);

  // Realtime subscription: any family member's change appears here automatically
  useEffect(() => {
    const unsub = FAMILY_DOC.onSnapshot((snap) => {
      if (snap.exists) {
        const remote = snap.data();
        skipNextWrite.current = true;
        setData({ ...defaultState(), ...remote.payload });
        setLastSync(remote.updatedBy ? `${remote.updatedBy} · ${new Date(remote.updatedAt?.toDate ? remote.updatedAt.toDate() : Date.now()).toLocaleString()}` : null);
      } else {
        FAMILY_DOC.set({ payload: defaultState(), updatedBy: user.email, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      }
      setCloudReady(true);
    }, (err) => { console.error(err); showToast("Cloud sync error - offline cache use ho raha hai."); setCloudReady(true); });
    return () => unsub();
  }, []);

  // Push local edits to Firestore (skips the write that was itself caused by an incoming snapshot)
  useEffect(() => {
    if (!cloudReady) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      FAMILY_DOC.set({ payload: data, updatedBy: user.email, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }).catch((e)=>console.error(e));
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
    }, 500);
    return () => clearTimeout(t);
  }, [data, cloudReady]);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2800); };

  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(()=>{});
    }
  }, []);

  const monthly = useMemo(()=>computeMonthly(data), [data]);
  const halfYearly = useMemo(()=>computeHalfYearly(monthly), [monthly]);
  const yearly = useMemo(()=>computeYearly(monthly), [monthly]);
  const categoryTotals = useMemo(()=>computeCategoryTotals(data), [data]);
  const incomeTotals = useMemo(()=>computeIncomeTotals(monthly), [monthly]);
  const cashBank = useMemo(()=>computeCashBank(data), [data]);
  const analytics = useMemo(()=>computeAnalytics(data, categoryTotals), [data, categoryTotals]);
  const health = useMemo(()=>computeHealth(data, yearly), [data, yearly]);

  const NAV = [
    ["dashboard","Dashboard","🏠"], ["rent","Rent Tracker","🏢"], ["income","Income Entry","💰"],
    ["recurring","Recurring Expenses","🔁"], ["expenses","Expense Entry","🧾"],
    ["monthly","Monthly Report","📅"], ["halfyearly","Half-Yearly Report","📆"], ["yearly","Yearly Report","📊"],
    ["goals","Savings Goals","🎯"], ["cashbank","Cash & Bank","🏦"], ["analytics","Analytics","📈"],
    ["print","Printable Report","🖨️"], ["instructions","Instructions","📘"],
  ];

  const handleImport = async (file) => {
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array", cellDates:true });
      const next = JSON.parse(JSON.stringify(data));
      let imported = [];
      const sheetRows = (name) => { const ws = wb.Sheets[name]; return ws ? XLSX.utils.sheet_to_json(ws, { header:1, defval:"" }) : null; };
      const toDateStr = (v) => { if (!v) return ""; if (v instanceof Date) return v.toISOString().slice(0,10); return String(v); };
      const findHeaderRow = (rows, firstCell) => rows.findIndex(r => String(r[0]).trim() === firstCell);

      const rt = sheetRows("Rent Tracker");
      if (rt) { const h = findHeaderRow(rt, "Portion / Tenant"); if (h>=0) {
        for (let i=h+1;i<rt.length;i++){ const row=rt[i]; const unit=String(row[0]||"").trim(); const month=String(row[1]||"").trim();
          if (!unit||!RENT_UNITS.includes(unit)||!MONTHS.includes(month)) continue;
          next.rent[`${unit}|${month}`] = { unit, month, dueDate:toDateStr(row[2]), due:Number(row[3])||0, received:Number(row[4])||0, cashBank:String(row[6]||""), notes:String(row[8]||"") };
        } imported.push("Rent Tracker"); } }

      const ie = sheetRows("Income Entry");
      if (ie) { const h = findHeaderRow(ie, "Date"); if (h>=0) {
        const entries=[]; for (let i=h+1;i<ie.length;i++){ const row=ie[i]; if(!row[0]&&!row[2]) continue;
          entries.push({ id:uid(), date:toDateStr(row[0]), source:String(row[2]||"Other Income"), dueDate:toDateStr(row[3]), expected:Number(row[4])||0, received:Number(row[5])||0, cashBank:String(row[7]||""), notes:String(row[9]||"") }); }
        if (entries.length){ next.income=entries; imported.push("Income Entry"); } } }

      const re = sheetRows("Recurring Expenses");
      if (re) { const h = findHeaderRow(re, "Category"); if (h>=0) {
        for (let i=h+1;i<re.length;i++){ const row=re[i]; const cat=String(row[0]||"").trim();
          if (!cat||cat.startsWith("TOTAL")||!next.recurring[cat]) continue;
          const months=[]; for(let m=0;m<12;m++) months.push(Number(row[2+m])||0);
          next.recurring[cat] = { method:String(row[1]||"Cash"), months }; }
        imported.push("Recurring Expenses"); } }

      const ee = sheetRows("Expense Entry");
      if (ee) { const h = findHeaderRow(ee, "Date"); if (h>=0) {
        const entries=[]; for (let i=h+1;i<ee.length;i++){ const row=ee[i]; if(!row[0]&&!row[2]) continue;
          entries.push({ id:uid(), date:toDateStr(row[0]), category:String(row[2]||"Other Small Expenses"), familyMember:String(row[3]||""), description:String(row[4]||""), amount:Number(row[5])||0, cashBank:String(row[6]||""), notes:String(row[7]||"") }); }
        if (entries.length){ next.expenses=entries; imported.push("Expense Entry"); } } }

      setData(next);
      showToast(imported.length ? `Import ho gaya: ${imported.join(", ")}` : "Koi matching sheet nahi mili.");
    } catch (err) { console.error(err); showToast("Import fail ho gaya - file check karein."); }

      <div style={{ flex:1, overflowY:"auto", padding:"10px 0" }}>
        {NAV.map(([id,label,icon]) => (

            style={{ padding:"11px 20px", fontSize:13.5, cursor:"pointer", display:"flex", alignItems:"center", gap:10,
              color: tab===id?"#60a5fa":"#cbd5e1", background: tab===id?"rgba(37,99,235,.12)":"transparent", borderRight: tab===id?"3px solid #3b82f6":"3px solid transparent" }}>
            <span>{icon}</span>{label}

      </div>
      <div style={{ padding:"10px 16px", borderTop:"1px solid #1e293b", fontSize:10.5, color:"#64748b" }}>
        {cloudReady ? (lastSync ? `☁ Last update: ${lastSync}` : "☁ Cloud synced") : "☁ Connecting..."}
      </div>
      <div style={{ padding:"0 16px 16px", display:"flex", flexDirection:"column", gap:8 }}>
        <Btn kind="ghost" style={{ width:"100%", justifyContent:"center" }} onClick={()=>fileRef.current?.click()}>⬆ Import Excel</Btn>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 2px" }}>

          <span onClick={()=>auth.signOut()} style={{ fontSize:11.5, color:"#f87171", cursor:"pointer", fontWeight:700 }}>Logout</span>

  return (
    <div style={{ minHeight:"100vh", background:"#020617", display:"flex" }}>
      <div className="no-print" style={{ width:260, flexShrink:0, background:"#0f172a", borderRight:"1px solid #1e293b", position:"sticky", top:0, height:"100vh", display: window.innerWidth<768 ? "none" : "block" }}>
        <Sidebar />
      </div>

      <div className="no-print" style={{ display: window.innerWidth<768 ? "flex":"none", position:"fixed", top:0, left:0, right:0, zIndex:30, background:"#0f172a", borderBottom:"1px solid #1e293b", padding:"12px 16px", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ width:30, height:30, borderRadius:8, background:"#2563eb", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12 }}>GF</div>
          <span style={{ fontWeight:800, fontSize:13 }}>GHAR FINANCE</span>
        </div>
        <div onClick={()=>setNavOpen(true)} style={{ fontSize:22, cursor:"pointer" }}>☰</div>
      </div>
      {navOpen && (
        <div style={{ position:"fixed", inset:0, zIndex:40, background:"#020617" }}>
          <div style={{ display:"flex", justifyContent:"flex-end", padding:14 }}>
            <div onClick={()=>setNavOpen(false)} style={{ fontSize:24, cursor:"pointer" }}>✕</div>
          </div>
          <Sidebar onNavigate={()=>setNavOpen(false)} />

      <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{ display:"none" }}
        onChange={(e)=>{ if (e.target.files?.[0]) handleImport(e.target.files[0]); e.target.value=""; }} />

      <div style={{ flex:1, minWidth:0, paddingTop: window.innerWidth<768 ? 64 : 0 }}>
        <div className="fade-in" style={{ maxWidth:1100, margin:"0 auto", padding: window.innerWidth<768 ? 16 : 32 }}>
          {tab==="dashboard" && <Dashboard {...{data, monthly, categoryTotals, incomeTotals, cashBank, yearly, health}} />}

/* ============================== DASHBOARD ============================== */
function Dashboard({ data, monthly, categoryTotals, incomeTotals, cashBank, yearly, health }) {
  const totalPension = monthly.reduce((s,r)=>s+r.pension,0);
  const totalShop = monthly.reduce((s,r)=>s+SHOP_UNITS.reduce((a,u)=>a+(r.rentBySource[u]||0),0),0);
  const totalPortion = monthly.reduce((s,r)=>s+PORTION_UNITS.reduce((a,u)=>a+(r.rentBySource[u]||0),0),0);
  const totalOther = monthly.reduce((s,r)=>s+r.other,0);
  const pendingRent = Object.values(data.rent).reduce((s,r)=>s+(Number(r.due||0)-Number(r.received||0)),0);
  const savingsInv = data.expenses.filter(e=>e.category==="Savings"||e.category==="Investment").reduce((s,e)=>s+Number(e.amount||0),0);
  const pieExpense = categoryTotals.filter(c=>c.total>0).slice(0,8);
  const pieIncome = incomeTotals.filter(c=>c.total>0);
  const grid4 = { display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:10, marginBottom:14 };
  return (
    <div>
      <SectionTitle title="Ghar ka Executive Dashboard" subtitle="Live overview — sab sections se auto-updated" />
      <div style={grid4}><KPI label="Total Pension" value={fmt(totalPension)} /><KPI label="Total Shop Rent" value={fmt(totalShop)} /><KPI label="Total Portion Rent" value={fmt(totalPortion)} /><KPI label="Other Income" value={fmt(totalOther)} /></div>
      <div style={grid4}><KPI label="Total Expenses" value={fmt(yearly.expense)} /><KPI label="Cash in Hand" value={fmt(cashBank.cashInHand)} positive={cashBank.cashInHand>=0} /><KPI label="Bank Balance" value={fmt(cashBank.bankBalance)} positive={cashBank.bankBalance>=0} /><KPI label="Pending Rent" value={fmt(pendingRent)} positive={pendingRent<=0} /></div>
      <div style={grid4}><KPI label="Net Profit/Loss (YTD)" value={fmt(yearly.profit)} positive={yearly.profit>=0} /><KPI label="Savings+Investment" value={fmt(savingsInv)} /><KPI label="Health Score" value={`${health.score}/100`} positive={health.score>=50} /><KPI label="Rent Collection %" value={pct(health.collectionRate)} positive={health.collectionRate>=0.8} /></div>

      <div style={{ display:"grid", gridTemplateColumns: "1fr", gap:14, marginTop:18 }}>
        <Card style={{ padding:16 }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:10, color:"#cbd5e1" }}>Monthly Income (blue) vs Expense (red)</div>
          <BarChartSimple data={monthly.map(m=>({label:m.month.slice(0,3), Income:m.totalIncome, Expense:m.totalExpense}))} aKey="Income" bKey="Expense" />
        </Card>
        <Card style={{ padding:16 }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:10, color:"#cbd5e1" }}>Cumulative Profit / Loss Trend</div>
          <LineChartSimple data={monthly.map(m=>({label:m.month.slice(0,3), value:m.cumulative}))} />
        </Card>
        <Card style={{ padding:16 }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:10, color:"#cbd5e1" }}>Yearly Expense Breakdown</div>
          <PieChartSimple data={pieExpense} />
        </Card>
        <Card style={{ padding:16 }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:10, color:"#cbd5e1" }}>Yearly Income Breakdown</div>
          <PieChartSimple data={pieIncome} />
        </Card>

    </div>
  );

/* ============================== RENT TRACKER ============================== */
function RentTracker({ data, setData }) {
  const [monthFilter, setMonthFilter] = useState(MONTHS[new Date().getMonth()]);
  const update = (unit, month, field, value) => setData(d => { const key=`${unit}|${month}`; return { ...d, rent: { ...d.rent, [key]: { ...d.rent[key], [field]:value } } }; });
  return (
    <div>
      <SectionTitle title="Rent Tracker" subtitle="Shops (Aqeel, Aslam) aur Portions (Sheba, Asif, Rema) ka mahana kiraya" />
      <div style={{ marginBottom:14, display:"flex", gap:8, alignItems:"center" }}>
        <span style={{ fontSize:13, color:"#94a3b8" }}>Month:</span>
        <Select options={MONTHS} value={monthFilter} onChange={e=>setMonthFilter(e.target.value)} style={{ width:160 }} />
      </div>
      <Card style={{ overflowX:"auto" }}>
        <table style={{ minWidth:820 }}>
          <thead><tr><Th>Portion/Tenant</Th><Th>Due Date</Th><Th>Rent Due</Th><Th>Received</Th><Th>Pending</Th><Th>Cash/Bank</Th><Th>Status</Th><Th>Notes</Th></tr></thead>
          <tbody>
            {RENT_UNITS.map(unit => {
              const rec = data.rent[`${unit}|${monthFilter}`] || {};
              const pending = Number(rec.due||0)-Number(rec.received||0);
              const status = (Number(rec.due||0)===0 && Number(rec.received||0)===0) ? "" : (pending<=0?"Paid":"Pending");
              return <tr key={unit}>
                <Td style={{ fontWeight:600, color:"#e2e8f0" }}>{unit}</Td>
                <Td><Input type="date" value={rec.dueDate||""} onChange={e=>update(unit,monthFilter,"dueDate",e.target.value)} /></Td>
                <Td><Input type="number" value={rec.due||0} onChange={e=>update(unit,monthFilter,"due",Number(e.target.value))} /></Td>
                <Td><Input type="number" value={rec.received||0} onChange={e=>update(unit,monthFilter,"received",Number(e.target.value))} /></Td>
                <Td style={{ color: pending>0?"#f87171":"#34d399", fontWeight:700 }}>{fmt(pending)}</Td>
                <Td><Select options={CASH_BANK} value={rec.cashBank} onChange={e=>update(unit,monthFilter,"cashBank",e.target.value)} /></Td>
                <Td>{status && <span style={{ padding:"2px 9px", borderRadius:20, fontSize:11, fontWeight:700, background: status==="Paid"?"rgba(52,211,153,.15)":"rgba(248,113,113,.15)", color: status==="Paid"?"#34d399":"#f87171" }}>{status}</span>}</Td>
                <Td><Input value={rec.notes||""} onChange={e=>update(unit,monthFilter,"notes",e.target.value)} /></Td>
              </tr>;
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

    <div>

                <Td><Select options={CASH_BANK} value={rec.method} onChange={e=>updateMethod(name,e.target.value)} /></Td>

      <Card style={{ padding:18, display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ fontSize:28 }}>{yearly.profit>=0 ? "✅" : "⚠️"}</div>
        <div><div style={{ fontWeight:800, fontSize:16 }}>{yearly.profit>=0 ? "PROFIT" : "LOSS"}</div><div style={{ fontSize:12.5, color:"#94a3b8" }}>Avg Monthly Income: {fmt(yearly.avgIncome)} · Avg Monthly Expense: {fmt(yearly.avgExpense)}</div></div>
      </Card>
    </div>
  );
}

/* ============================== SAVINGS GOALS ============================== */
function SavingsGoals({ data, setData }) {
  const update = (id,f,v) => setData(d=>({ ...d, goals: d.goals.map(g=>g.id===id?{...g,[f]:v}:g) }));
  const addGoal = () => setData(d=>({ ...d, goals:[...d.goals, { id:uid(), goal:"New Goal", target:0, saved:0 }] }));
  const remove = (id) => setData(d=>({ ...d, goals: d.goals.filter(g=>g.id!==id) }));
  return (
    <div>
      <SectionTitle title="Savings Goals" subtitle="Apne financial goals set karein aur progress track karein" />
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))", gap:14 }}>
        {data.goals.map(g => { const remaining=Number(g.target||0)-Number(g.saved||0); const progress=g.target?Math.min(100,(g.saved/g.target)*100):0; return (
          <Card key={g.id} style={{ padding:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
              <Input value={g.goal} onChange={e=>update(g.id,"goal",e.target.value)} style={{ fontWeight:700, fontSize:14.5, background:"transparent", border:"none", padding:0 }} />
              <span onClick={()=>remove(g.id)} style={{ cursor:"pointer", color:"#64748b" }}>🗑</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
              <div><div style={{ fontSize:11, color:"#94a3b8" }}>Target</div><Input type="number" value={g.target} onChange={e=>update(g.id,"target",Number(e.target.value))} /></div>
              <div><div style={{ fontSize:11, color:"#94a3b8" }}>Saved</div><Input type="number" value={g.saved} onChange={e=>update(g.id,"saved",Number(e.target.value))} /></div>
            </div>
            <div style={{ width:"100%", background:"#1e293b", borderRadius:20, height:8, marginBottom:8 }}><div style={{ width:`${progress}%`, background:"#2563eb", height:8, borderRadius:20 }} /></div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#94a3b8" }}><span>{progress.toFixed(0)}%</span><span>Remaining: {fmt(remaining)}</span></div>
          </Card>);
        })}
      </div>
      <div style={{ marginTop:14 }}><Btn kind="link" onClick={addGoal}>+ Naya goal</Btn></div>
    </div>
  );
}

/* ============================== CASH & BANK ============================== */
function CashBankView({ data, setData, cashBank }) {
  return (
    <div>
      <SectionTitle title="Cash & Bank Summary" subtitle="Auto-calculated from Income, Rent aur Expense entries" />
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:14, marginBottom:16 }}>
        <Card style={{ padding:14 }}><div style={{ fontSize:11, color:"#94a3b8" }}>Opening Cash Balance</div><Input type="number" value={data.openingCash} onChange={e=>setData(d=>({...d,openingCash:Number(e.target.value)}))} /></Card>
        <Card style={{ padding:14 }}><div style={{ fontSize:11, color:"#94a3b8" }}>Opening Bank Balance</div><Input type="number" value={data.openingBank} onChange={e=>setData(d=>({...d,openingBank:Number(e.target.value)}))} /></Card>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:10, marginBottom:16 }}>
        <KPI label="Total Cash IN" value={fmt(cashBank.cashIn)} /><KPI label="Total Cash OUT" value={fmt(cashBank.cashOut)} />
        <KPI label="Total Bank IN" value={fmt(cashBank.bankIn)} /><KPI label="Total Bank OUT" value={fmt(cashBank.bankOut)} />
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:14 }}>
        <Card style={{ padding:18, display:"flex", gap:12, alignItems:"center" }}><span style={{ fontSize:26 }}>💵</span><div><div style={{ fontSize:11, color:"#94a3b8" }}>Cash in Hand</div><div style={{ fontSize:22, fontWeight:800 }}>{fmt(cashBank.cashInHand)}</div></div></Card>
        <Card style={{ padding:18, display:"flex", gap:12, alignItems:"center" }}><span style={{ fontSize:26 }}>🏦</span><div><div style={{ fontSize:11, color:"#94a3b8" }}>Bank Balance</div><div style={{ fontSize:22, fontWeight:800 }}>{fmt(cashBank.bankBalance)}</div></div></Card>
      </div>
    </div>
  );
}

/* ============================== ANALYTICS ============================== */
function Analytics({ analytics, categoryTotals }) {
  const top15 = categoryTotals.slice(0,15);
  const maxVal = Math.max(...top15.map(c=>c.total),1);
  return (
    <div>
      <SectionTitle title="Analytics" subtitle="Top kharche, family-member wise spending, tenant-wise rent collection" />
      <Card style={{ padding:16, marginBottom:16 }}>
        <div style={{ fontSize:12, color:"#94a3b8" }}>Top Expense Category (Yearly)</div>
        <div style={{ fontSize:18, fontWeight:800, color:"#D4AF37" }}>{analytics.top.name}</div>
        <div style={{ color:"#cbd5e1" }}>{fmt(analytics.top.total)}</div>
      </Card>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))", gap:14, marginBottom:16 }}>
        <Card style={{ padding:16 }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:10, color:"#cbd5e1" }}>Category Ranking</div>
          {top15.map(c => (
            <div key={c.name} style={{ marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:11.5, marginBottom:3 }}><span style={{color:"#cbd5e1"}}>{c.name}</span><span style={{color:"#94a3b8"}}>{fmt(c.total)}</span></div>
              <div style={{ width:"100%", background:"#1e293b", borderRadius:20, height:6 }}><div style={{ width:`${(c.total/maxVal)*100}%`, background:"#2563eb", height:6, borderRadius:20 }} /></div>
            </div>
          ))}
        </Card>
        <Card style={{ padding:16 }}>
          <div style={{ fontWeight:700, fontSize:13, marginBottom:10, color:"#cbd5e1" }}>Family Member Spend</div>
          {analytics.familySpend.map(f => <div key={f.name} style={{ display:"flex", justifyContent:"space-between", fontSize:13, padding:"7px 0", borderBottom:"1px solid #1e293b" }}><span>{f.name}</span><span style={{fontWeight:700}}>{fmt(f.total)}</span></div>)}
        </Card>
      </div>
      <Card style={{ overflowX:"auto", padding:16 }}>
        <div style={{ fontWeight:700, fontSize:13, marginBottom:10, color:"#cbd5e1" }}>Tenant-wise Rent Collection (Yearly)</div>
        <table style={{ minWidth:640 }}>
          <thead><tr><Th>Portion/Tenant</Th><Th>Expected</Th><Th>Received</Th><Th>Pending</Th><Th>Collection %</Th></tr></thead>
          <tbody>{analytics.tenants.map(t => (
            <tr key={t.unit}><Td style={{fontWeight:600}}>{t.unit}</Td><Td>{fmt(t.expected)}</Td><Td>{fmt(t.received)}</Td>
              <Td style={{ color: t.pending>0?"#f87171":"#34d399" }}>{fmt(t.pending)}</Td><Td>{pct(t.pct)}</Td></tr>
          ))}</tbody>
        </table>
      </Card>
    </div>
  );
}

/* ============================== PRINTABLE REPORT ============================== */
function PrintableReport({ monthly, yearly, cashBank }) {
  const now = new Date(); const thisMonth = monthly[now.getMonth()];
  const rows = [["Total Income (This Month)",fmt(thisMonth.totalIncome)],["Total Expense (This Month)",fmt(thisMonth.totalExpense)],
    ["Profit/Loss (This Month)",fmt(thisMonth.profit)],["Year-to-Date Profit/Loss",fmt(yearly.profit)],
    ["Cash in Hand",fmt(cashBank.cashInHand)],["Bank Balance",fmt(cashBank.bankBalance)]];
  return (
    <div>
      <SectionTitle title="Printable Report" subtitle="Print-ready one-page summary" />
      <Card style={{ padding:22, maxWidth:420 }}>
        <div style={{ fontSize:12, color:"#94a3b8", marginBottom:14 }}>Report For: <b style={{color:"#fff"}}>{MONTHS[now.getMonth()]} {now.getFullYear()}</b></div>
        {rows.map(([l,v]) => <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid #1e293b", fontSize:13 }}><span style={{color:"#cbd5e1"}}>{l}</span><span style={{fontWeight:700}}>{v}</span></div>)}
        <Btn kind="primary" style={{ width:"100%", justifyContent:"center", marginTop:16 }} onClick={()=>window.print()}>🖨 Print this report</Btn>
      </Card>
    </div>
  );
}

/* ============================== LOGIN / AUTH GATE ============================== */
function Login() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleLogin = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(email.trim(), password);
    } catch (err) {
      const map = {
        "auth/invalid-email": "Email theek se likhein.",
        "auth/user-not-found": "Yeh email register nahi hai. Admin se naya account banwayein.",
        "auth/wrong-password": "Password ghalat hai.",
        "auth/invalid-credential": "Email ya password ghalat hai.",
        "auth/too-many-requests": "Bohot zyada koshishein ho gayi — thodi der baad try karein.",
      };
      setError(map[err.code] || "Login fail ho gaya: " + err.message);
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#020617", padding:20 }}>
      <div style={{ width:"100%", maxWidth:380 }}>
        <div style={{ textAlign:"center", marginBottom:26 }}>
          <div style={{ width:56, height:56, borderRadius:14, background:"#2563eb", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:20, margin:"0 auto 14px" }}>GF</div>
          <div style={{ fontWeight:800, fontSize:18, letterSpacing:.5 }}>GHAR FINANCE</div>
          <div style={{ fontSize:12.5, color:"#94a3b8", marginTop:4 }}>Family Budget System — Login karein</div>
        </div>
        <Card style={{ padding:24 }}>
          <form onSubmit={handleLogin}>
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11.5, color:"#94a3b8", marginBottom:5 }}>Email</div>
              <Input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="aapka@email.com" />
            </div>
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:11.5, color:"#94a3b8", marginBottom:5 }}>Password</div>
              <Input type="password" required value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" />
            </div>
            {error && <div style={{ background:"rgba(248,113,113,.1)", color:"#f87171", fontSize:12.5, padding:"9px 12px", borderRadius:8, marginBottom:14 }}>{error}</div>}
            <Btn kind="primary" style={{ width:"100%", justifyContent:"center" }}>{loading ? "Login ho raha hai..." : "Login"}</Btn>
          </form>
        </Card>
        <div style={{ textAlign:"center", fontSize:11.5, color:"#64748b", marginTop:16 }}>
          Naya account chahiye? Admin (Ahsan) se Firebase Console se banwayein.
        </div>
      </div>
    </div>
  );
}

function AuthGate() {
  const [user, setUser] = useState(undefined); // undefined = checking, null = logged out, object = logged in
  useEffect(() => auth.onAuthStateChanged(setUser), []);
  if (user === undefined) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#020617", color:"#94a3b8", fontSize:13 }}>Loading...</div>;
  }
  if (!user) return <Login />;
  return <App user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);
</script>
